<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>オフライン個人メモ帳</title>

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0b0f14">

<style>
body{margin:0;background:#0b0f14;color:#fff;font-family:sans-serif}
.hide{display:none}
</style>
</head>

<body>

<!-- ロック画面 -->
<div id="lockScreen">
  <h2>🔒 ロック解除</h2>
  <input id="lockPassInput" placeholder="パスコード">
  <input id="lockPassConfirmInput" placeholder="確認用">
  <button id="unlockBtn">開始 / ロック解除</button>
  <button id="changePassBtn">パス変更</button>
  <div id="lockMessage"></div>
</div>

<!-- アプリ -->
<div id="appRoot" class="hide">
  <h2>📝 メモ帳</h2>

  <button id="newBtn">新規</button>
  <button id="exportBtn">書き出し</button>
  <button id="migratePassBtn">旧パス移行</button>
  <input id="importInput" type="file">

  <ul id="noteList"></ul>

  <input id="titleInput" placeholder="タイトル">
  <input id="folderInput" placeholder="フォルダ">
  <textarea id="contentInput"></textarea>

</div>

<script>
const STORAGE_KEY = 'memo';
const LOCK_KEY = 'lock';

const enc = new TextEncoder();
const dec = new TextDecoder();

let state = {notes:[],selectedId:null};
let unlockedPasscode = "";

// ================= AES =================
function b64(a){return btoa(String.fromCharCode(...new Uint8Array(a)))}
function b642(a){return Uint8Array.from(atob(a),c=>c.charCodeAt(0))}

async function getKey(pass,salt){
 const km = await crypto.subtle.importKey("raw",enc.encode(pass),"PBKDF2",false,["deriveKey"]);
 return crypto.subtle.deriveKey(
  {name:"PBKDF2",salt,iterations:100000,hash:"SHA-256"},
  km,
  {name:"AES-GCM",length:256},
  false,
  ["encrypt","decrypt"]
 );
}

async function encryptText(text,pass){
 const iv = crypto.getRandomValues(new Uint8Array(12));
 const salt = crypto.getRandomValues(new Uint8Array(16));
 const key = await getKey(pass,salt);
 const buf = await crypto.subtle.encrypt({name:"AES-GCM",iv},key,enc.encode(text));
 return {salt:b64(salt),iv:b64(iv),cipher:b64(buf)};
}

async function decryptText(data,pass){
 const key = await getKey(pass,b642(data.salt));
 const buf = await crypto.subtle.decrypt({name:"AES-GCM",iv:b642(data.iv)},key,b642(data.cipher));
 return dec.decode(buf);
}

// ================= ロック =================
function getPass(){return localStorage.getItem(LOCK_KEY)||""}
function setPass(p){localStorage.setItem(LOCK_KEY,p)}

async function handleUnlock(){
 const saved = getPass();
 const p = lockPassInput.value;

 if(!saved){
  if(p.length<4)return msg("4文字以上");
  if(p!==lockPassConfirmInput.value)return msg("一致しない");
  setPass(p);
  unlockedPasscode=p;
 }else{
  if(p!==saved)return msg("違う");
  unlockedPasscode=p;
 }

 openApp();
}

function msg(t){lockMessage.textContent=t}

async function openApp(){
 lockScreen.classList.add("hide");
 appRoot.classList.remove("hide");
 await decryptAll();
 render();
}

// ================= データ =================
function save(){
 localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
}

function load(){
 try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}")}
 catch{return {notes:[]}}
}

async function encryptAll(){
 for(const n of state.notes){
  n.encrypted = await encryptText(n.content||"",unlockedPasscode);
  n.content="";
 }
}

async function decryptAll(){
 for(const n of state.notes){
  if(n.encrypted){
   try{
    n.content = await decryptText(n.encrypted,unlockedPasscode);
   }catch{
    n.content="";
   }
  }
 }
}

// ================= UI =================
function render(){
 noteList.innerHTML="";
 state.notes.forEach(n=>{
  const li=document.createElement("li");
  li.textContent=n.title||"無題";
  li.onclick=()=>{state.selectedId=n.id;loadNote()}
  noteList.appendChild(li);
 });
}

function loadNote(){
 const n=state.notes.find(x=>x.id===state.selectedId);
 if(!n)return;
 titleInput.value=n.title||"";
 contentInput.value=n.content||"";
}

// ================= 操作 =================
newBtn.onclick=()=>{
 const n={id:Date.now(),title:"",content:""};
 state.notes.push(n);
 state.selectedId=n.id;
 render();
}

titleInput.oninput=()=>update();
contentInput.oninput=()=>update();

function update(){
 const n=state.notes.find(x=>x.id===state.selectedId);
 if(!n)return;
 n.title=titleInput.value;
 n.content=contentInput.value;
 save();
}

// ================= 移行 =================
migratePassBtn.onclick=async()=>{
 const old = prompt("旧パス");
 if(!old)return;

 const current = getPass();

 for(const n of state.notes){
  if(!n.encrypted)continue;

  try{
   const txt = await decryptText(n.encrypted,old);
   n.content = txt;
   n.encrypted = await encryptText(txt,current);
  }catch{}
 }

 unlockedPasscode=current;
 save();
 alert("移行完了");
}

// ================= import =================
importInput.onchange=async(e)=>{
 const file=e.target.files[0];
 const text=await file.text();
 const data=JSON.parse(text);

 state=data;

 const old=prompt("旧パス");
 const current=getPass();

 for(const n of state.notes){
  if(!n.encrypted)continue;

  try{
   const txt = await decryptText(n.encrypted,old);
   n.content=txt;

   if(old!==current){
    n.encrypted = await encryptText(txt,current);
   }

  }catch{}
 }

 unlockedPasscode=current;
 save();
 render();

 alert("読み込み完了");
}

// ================= 起動 =================
state = load();

unlockBtn.onclick=handleUnlock;

</script>
</body>
</html>
