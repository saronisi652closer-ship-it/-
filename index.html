<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ロック付きメモ帳</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b0f14;
  color:white;
}

/* ロック画面 */
.lock{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
}

input{
  padding:10px;
  border-radius:10px;
  border:none;
  width:200px;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#4da7ff;
  color:white;
}

/* メモ画面 */
.app{
  display:none;
  padding:20px;
}
textarea{
  width:100%;
  height:200px;
}
</style>
</head>

<body>

<!-- ロック画面 -->
<div id="lock" class="lock">
  <h2>🔒 ロック解除</h2>
  <input id="pass" type="password" placeholder="パスコード">
  <input id="pass2" type="password" placeholder="確認用（初回のみ）">
  <button onclick="unlock()">開く</button>
  <div id="msg"></div>
</div>

<!-- メモ画面 -->
<div id="app" class="app">
  <h2>メモ帳</h2>
  <textarea id="memo"></textarea>
</div>

<script>
const KEY = "memo_pass";
const MEMO = "memo_data";

function unlock(){
  const saved = localStorage.getItem(KEY);
  const pass = document.getElementById("pass").value;
  const pass2 = document.getElementById("pass2").value;
  const msg = document.getElementById("msg");

  // 初回
  if(!saved){
    if(pass.length < 4){
      msg.textContent = "4文字以上";
      return;
    }
    if(pass !== pass2){
      msg.textContent = "一致しない";
      return;
    }
    localStorage.setItem(KEY, pass);
    openApp();
    return;
  }

  // 通常
  if(pass !== saved){
    msg.textContent = "違う";
    return;
  }

  openApp();
}

function openApp(){
  document.getElementById("lock").style.display="none";
  document.getElementById("app").style.display="block";
  loadMemo();
}

function loadMemo(){
  document.getElementById("memo").value =
    localStorage.getItem(MEMO) || "";
}

document.getElementById("memo").addEventListener("input", e=>{
  localStorage.setItem(MEMO, e.target.value);
});
</script>

</body>
</html>
