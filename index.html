<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>個人メモ帳 完全版</title>

<style>
body{margin:0;background:#0b0f14;color:#fff;font-family:sans-serif}
.app{display:grid;grid-template-columns:260px 1fr;height:100vh}
.sidebar{border-right:1px solid #333;padding:10px}
.main{padding:10px}
.note{padding:10px;border-bottom:1px solid #333;cursor:pointer}
.note.active{background:#222}
button{margin:4px}
input,textarea{width:100%;margin:4px 0;background:#111;color:#fff;border:1px solid #333}
</style>
</head>

<body>

<div id="lock">
  <h2>ロック解除</h2>
  <input id="pass" type="password" placeholder="パスコード">
  <button onclick="unlock()">解除</button>
</div>

<div class="app" id="app" style="display:none">

  <div class="sidebar">
    <button onclick="createNote()">＋メモ</button>
    <button onclick="showTrash()">🗑ゴミ箱</button>

    <div id="folderList"></div>
    <hr>
    <div id="list"></div>
  </div>

  <div class="main">
    <input id="title" placeholder="タイトル">
    <input id="folder" placeholder="フォルダ">
    <textarea id="content"></textarea>

    <button onclick="save()">保存</button>
    <button onclick="deleteNote()">削除</button>
    <button onclick="restoreNote()">復元</button>
  </div>

</div>

<script>
const KEY="memo_v3"
const PASS_KEY="memo_pass"

let state={notes:[],selected:null,showTrash:false}
let passcode=""

// ---------- ロック ----------
function unlock(){
  const p=document.getElementById("pass").value

  if(!localStorage.getItem(PASS_KEY)){
    localStorage.setItem(PASS_KEY,p)
    passcode=p
  }else{
    if(p!==localStorage.getItem(PASS_KEY)){
      alert("違う")
      return
    }
    passcode=p
  }

  load()
  document.getElementById("lock").style.display="none"
  document.getElementById("app").style.display="grid"
}

// ---------- データ ----------
function saveStorage(){
  localStorage.setItem(KEY,JSON.stringify(state))
}

function load(){
  const raw=localStorage.getItem(KEY)
  if(raw) state=JSON.parse(raw)
  render()
}

// ---------- CRUD ----------
function createNote(){
  const n={
    id:Date.now(),
    title:"",
    content:"",
    folder:"",
    deleted:false
  }
  state.notes.push(n)
  state.selected=n.id
  saveStorage()
  render()
}

function save(){
  const n=get()
  if(!n)return

  n.title=title.value
  n.content=content.value
  n.folder=folder.value

  saveStorage()
  render()
}

function deleteNote(){
  const n=get()
  if(!n)return
  n.deleted=true
  saveStorage()
  render()
}

function restoreNote(){
  const n=get()
  if(!n)return
  n.deleted=false
  saveStorage()
  render()
}

function get(){
  return state.notes.find(n=>n.id===state.selected)
}

// ---------- 表示 ----------
function render(){
  renderFolders()
  renderList()

  const n=get()
  if(!n)return

  title.value=n.title
  content.value=n.content
  folder.value=n.folder
}

function renderList(){
  const el=document.getElementById("list")
  el.innerHTML=""

  const list=state.notes.filter(n=>n.deleted===state.showTrash)

  list.forEach(n=>{
    const div=document.createElement("div")
    div.className="note"+(n.id===state.selected?" active":"")
    div.innerText=n.title||"無題"
    div.onclick=()=>{state.selected=n.id;render()}
    el.appendChild(div)
  })
}

function renderFolders(){
  const el=document.getElementById("folderList")
  el.innerHTML=""

  const folders=[...new Set(state.notes.map(n=>n.folder).filter(Boolean))]

  folders.forEach(f=>{
    const d=document.createElement("div")
    d.innerText="📁 "+f
    d.onclick=()=>{
      state.showTrash=false
      state.notes=state.notes
      render()
    }
    el.appendChild(d)
  })
}

// ---------- モード ----------
function showTrash(){
  state.showTrash=!state.showTrash
  render()
}
</script>

</body>
</html>
